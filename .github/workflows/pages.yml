name: Deploy The Celestial Archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout guide
        uses: actions/checkout@v6
      - name: Prepare release site
        run: |
          curl -fsSL -o app.zip https://github.com/ted0103/celestial-archive/releases/download/v0.1.0/celestial-archive-friend-preview-v0.1.0.zip
          mkdir site
          unzip -q app.zip -d site
          cp download.html site/download.html
          touch site/.nojekyll
          mkdir -p site/.well-known
          cp .well-known/assetlinks.json site/.well-known/assetlinks.json
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
